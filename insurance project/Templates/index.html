<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Insurance Charges Predictor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    text-align:center;
    padding:25px;
    color:white;
    font-size:28px;
    font-weight:600;
    background:rgba(0,0,0,0.2);
    backdrop-filter:blur(10px);
}

/* MAIN CONTAINER */
main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* FORM CARD */
.form-card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:800px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease-in-out;
}

.form-card h2{
    text-align:center;
    margin-bottom:30px;
    color:white;
    font-weight:600;
}

/* GRID LAYOUT */
.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

/* INPUT STYLE */
.form-group{
    display:flex;
    flex-direction:column;
}

label{
    color:white;
    margin-bottom:6px;
    font-size:14px;
}

input, select{
    padding:10px;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:14px;
}

/* BUTTON */
.button-container{
    text-align:center;
    margin-top:30px;
}

button{
    background:#00c6ff;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* RESULT CARD */
.result-card{
    margin-top:25px;
    text-align:center;
    font-size:22px;
    font-weight:600;
    color:white;
    padding:15px;
    border-radius:12px;
    background:rgba(0,0,0,0.3);
}

/* FOOTER */
footer{
    text-align:center;
    padding:15px;
    background:rgba(0,0,0,0.3);
    color:white;
    font-size:14px;
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* RESPONSIVE */
@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<header>
💡 Insurance Charges Prediction System
</header>

<main>
<div class="form-card">

<h2>Enter Applicant Details</h2>

<form action="{{ url_for('predict') }}" method="post">

<div class="form-grid">

<div class="form-group">
<label>Age</label>
<input type="number" name="age" required>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender" required>
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</div>

<div class="form-group">
<label>BMI</label>
<input type="number" step="0.1" name="bmi" required>
</div>

<div class="form-group">
<label>Number of Children</label>
<input type="number" name="children" required>
</div>

<div class="form-group">
<label>Smoker</label>
<select name="smoker" required>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>
</div>

<div class="form-group">
<label>Region</label>
<select name="region" required>
<option value="northeast">Northeast</option>
<option value="northwest">Northwest</option>
<option value="southeast">Southeast</option>
<option value="southwest">Southwest</option>
</select>
</div>

</div>

<div class="button-container">
<button type="submit">Predict Insurance Charges</button>
</div>

</form>

{% if prediction %}
<div class="result-card">
Predicted Insurance Charges: ${{ prediction }}
</div>
{% endif %}

</div>
</main>

<footer>
© 2026 Insurance Charges Prediction System | Powered by Machine Learning
</footer>

</body>
</html>
